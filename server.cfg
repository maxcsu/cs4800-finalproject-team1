server-ip=0.0.0.0
server-port=7777 // TCP Port
server-motd=JavaTron Server // Displayed to players while in lobby.
max-clients=20 // Must be 2+ per spec.
max-matches=10
allow-botgames=true // Allow bot matches while in lobby.
trail-time=-1 // -1 = Permanent trails.
enforce-uniquecolors=false

// Logging
logtofile=true // Write server logs to a file.
logonefile=false // If true: use javatron.log (wiped each start). If false: timestamped log in logs/.
logtowebhook=false // If true: also send logs to Discord webhook.
logwebhookurl= // Discord webhook URL (leave blank to disable).
